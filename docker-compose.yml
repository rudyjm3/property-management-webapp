services:
  postgres:
    image: postgres:15-alpine
    container_name: propflow_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: propflow
      POSTGRES_PASSWORD: propflow_dev
      POSTGRES_DB: propflow_dev
    volumes:
      - propflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propflow -d propflow_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: propflow_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - propflow_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  propflow_postgres_data:
  propflow_redis_data:
